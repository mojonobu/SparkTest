<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Splat Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background: #ddd7b5; }
    canvas { display: block; }
    #status {
      position: fixed; top: 10px; left: 10px;
      color: #fff; font-family: monospace; font-size: 14px;
      z-index: 10; background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 4px;
    }
    #camera-info {
      position: fixed; bottom: 10px; left: 10px;
      color: #0f0; font-family: monospace; font-size: 13px;
      z-index: 10; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px;
      white-space: pre; user-select: all;
    }
  </style>
</head>
<body>
<div id="status">Loading...</div>
<div id="camera-info"></div>
<script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
      "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
    }
  }
</script>
<script type="module">
  import * as THREE from "three";
  import { SplatMesh, SparkRenderer, SparkControls } from "@sparkjsdev/spark";

  const status = document.getElementById("status");

  // Scene setup
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
  camera.position.set(-0.14, 0.41, 1.4);
  camera.rotation.set(
    THREE.MathUtils.degToRad(7.6),
    THREE.MathUtils.degToRad(9.8),
    THREE.MathUtils.degToRad(-1.3)
  );

  // Render at half resolution for performance
  const scale = 0.5;
  const renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setSize(window.innerWidth * scale, window.innerHeight * scale, false);
  renderer.domElement.style.width = "100vw";
  renderer.domElement.style.height = "100vh";
  renderer.setPixelRatio(1.0);
  renderer.setClearColor(0xddd7b5);
  document.body.appendChild(renderer.domElement);

  // SparkRenderer — aggressive LOD for software-rendered environments
  const spark = new SparkRenderer({
    renderer,
    enableLod: true,
    lodSplatCount: 30000,
    lodSplatScale: 0.15,
    lodRenderScale: 12.0,
    maxStdDev: 1.5,
    minAlpha: 0.2,
    minSortIntervalMs: 500,
  });
  scene.add(spark);

  // Camera controls
  const controls = new SparkControls({ canvas: renderer.domElement });

  // FPS counter
  let fps = 0, frameCount = 0, lastFpsTime = performance.now();

  // Auto-pan state
  const initCamPos = camera.position.clone();
  const panAmount = 4.0; // +/-4.0 units left-right
  const panSpeed = 0.8; // radians per second
  let loaded = false;
  let autoPan = true;

  // Stop auto-pan on user interaction
  const canvas = renderer.domElement;
  for (const evt of ["pointerdown", "wheel", "touchstart"]) {
    canvas.addEventListener(evt, () => { autoPan = false; }, { once: true });
  }

  // Load splat
  const splat = new SplatMesh({
    url: "splats/nijojo.spz",
    onProgress: (e) => {
      if (e.total) {
        const pct = Math.round((e.loaded / e.total) * 100);
        status.textContent = `Loading... ${pct}%`;
      }
    },
    onLoad: (mesh) => {
      console.log("Splat loaded", mesh);
      loaded = true;
      status.textContent = "Loaded";
      setTimeout(() => { status.style.display = "none"; }, 2000);
    },
  });
  splat.quaternion.set(1, 0, 0, 0);
  scene.add(splat);

  // Animation loop
  renderer.setAnimationLoop((time) => {
    if (loaded && autoPan) {
      const t = time * 0.001;
      camera.position.x = initCamPos.x + Math.sin(t * panSpeed) * panAmount;
      camera.position.z = initCamPos.z + (Math.sin(t * panSpeed * 0.7) - 1) * 5.5;
    }
    renderer.render(scene, camera);
    controls.update(camera);

    // Update FPS & stats
    frameCount++;
    const now = performance.now();
    if (now - lastFpsTime >= 500) {
      fps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
      frameCount = 0;
      lastFpsTime = now;
    }
    const splats = spark.activeSplats ?? "?";
    const max = spark.maxSplats ?? "?";
    document.getElementById("camera-info").textContent =
      `FPS: ${fps}  splats: ${splats.toLocaleString()} / ${max.toLocaleString()}`;
  });

  // Handle resize
  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth * scale, window.innerHeight * scale, false);
  });
</script>
</body>
</html>
