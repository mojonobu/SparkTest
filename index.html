<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Splat Viewer</title>
  <style>
    html, body { margin: 0; overflow: hidden; background: #ddd7b5; touch-action: none; position: fixed; width: 100%; height: 100%; }
    canvas { display: block; touch-action: none; }
    #status {
      position: fixed; top: 10px; left: 10px;
      color: #fff; font-family: monospace; font-size: 14px;
      z-index: 10; background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 4px;
    }
    #camera-info {
      position: fixed; bottom: 10px; left: 10px;
      color: #0f0; font-family: monospace; font-size: 13px;
      z-index: 10; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px;
      white-space: pre; user-select: all;
    }
  </style>
</head>
<body>
<div id="status">Loading...</div>
<div id="camera-info"></div>
<script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
      "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
    }
  }
</script>
<script type="module">
  import * as THREE from "three";
  import { SplatMesh, SparkRenderer, SparkControls } from "@sparkjsdev/spark";

  const status = document.getElementById("status");

  // Scene setup
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
  camera.position.set(0.86, 0.41, 1.4);
  camera.rotation.set(
    THREE.MathUtils.degToRad(7.6),
    THREE.MathUtils.degToRad(14.8),
    THREE.MathUtils.degToRad(-1.3)
  );

  const renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0xddd7b5);
  document.body.appendChild(renderer.domElement);

  const spark = new SparkRenderer({ renderer });
  scene.add(spark);

  // Camera controls
  const controls = new SparkControls({ canvas: renderer.domElement });

  // FPS counter
  let fps = 0, frameCount = 0, lastFpsTime = performance.now();

  // Auto-pan state
  const initCamPos = camera.position.clone();
  const panAmount = 4.0; // +/-4.0 units left-right
  const panSpeed = 0.8; // radians per second
  let loaded = false;
  let autoPan = true;

  // Stop auto-pan on user interaction
  const canvas = renderer.domElement;
  for (const evt of ["pointerdown", "wheel", "touchstart"]) {
    canvas.addEventListener(evt, () => { autoPan = false; }, { once: true });
  }

  // Pinch to dolly (move camera forward/back)
  let pinchStartDist = 0;
  let pinchStartZ = 0;
  const pinchSpeed = 0.02;
  canvas.addEventListener("touchstart", (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchStartDist = Math.hypot(dx, dy);
      pinchStartZ = camera.position.z;
    }
  }, { passive: true });
  canvas.addEventListener("touchmove", (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      const delta = (dist - pinchStartDist) * pinchSpeed;
      camera.position.z = pinchStartZ - delta;
    }
  }, { passive: true });

  // Load splat
  const splat = new SplatMesh({
    url: "splats/nijojo.spz",
    onProgress: (e) => {
      if (e.total) {
        const pct = Math.round((e.loaded / e.total) * 100);
        status.textContent = `Loading... ${pct}%`;
      }
    },
    onLoad: (mesh) => {
      console.log("Splat loaded", mesh);
      loaded = true;
      status.textContent = "Loaded";
      setTimeout(() => { status.style.display = "none"; }, 2000);
    },
  });
  splat.quaternion.set(1, 0, 0, 0);
  scene.add(splat);

  // Animation loop
  renderer.setAnimationLoop((time) => {
    if (loaded && autoPan) {
      const t = time * 0.001;
      camera.position.x = initCamPos.x + Math.sin(t * panSpeed) * panAmount;
      const zProgress = (Math.cos(t * panSpeed * 0.7) - 1) * 0.5; // -1 to 0, starts at 0 (farthest)
      camera.position.z = initCamPos.z + zProgress * 17.0;
      camera.rotation.x = THREE.MathUtils.degToRad(7.6 + zProgress * -10);
      camera.rotation.y = THREE.MathUtils.degToRad(14.8 + zProgress * 5);
    }
    renderer.render(scene, camera);
    controls.update(camera);

    // Update FPS & stats
    frameCount++;
    const now = performance.now();
    if (now - lastFpsTime >= 500) {
      fps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
      frameCount = 0;
      lastFpsTime = now;
    }
    const splats = spark.activeSplats ?? "?";
    const max = spark.maxSplats ?? "?";
    document.getElementById("camera-info").textContent =
      `FPS: ${fps}  splats: ${splats.toLocaleString()} / ${max.toLocaleString()}`;
  });

  // Handle resize
  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
