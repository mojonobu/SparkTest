<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Splat Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
    #status {
      position: fixed; top: 10px; left: 10px;
      color: #fff; font-family: monospace; font-size: 14px;
      z-index: 10; background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 4px;
    }
  </style>
</head>
<body>
<div id="status">Loading...</div>
<script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
      "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
    }
  }
</script>
<script type="module">
  import * as THREE from "three";
  import { SplatMesh, SparkRenderer, SparkControls } from "@sparkjsdev/spark";

  const status = document.getElementById("status");

  // Scene setup
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
  camera.position.set(0, 1, 5);

  const renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // SparkRenderer for splat rendering
  const spark = new SparkRenderer({ renderer });
  scene.add(spark);

  // Camera controls
  const controls = new SparkControls({ canvas: renderer.domElement });

  // Auto-orbit state
  const orbitCenter = new THREE.Vector3();
  let orbitRadius = 5;
  let orbitBaseAngle = 0;
  const orbitSwing = THREE.MathUtils.degToRad(75); // +/-75 degrees
  const orbitSpeed = 0.12; // radians per second
  let orbitCenterY = 0;
  let loaded = false;
  let autoRotate = true;

  // Stop auto-rotate on user interaction
  const canvas = renderer.domElement;
  for (const evt of ["pointerdown", "wheel", "touchstart"]) {
    canvas.addEventListener(evt, () => { autoRotate = false; }, { once: true });
  }

  // Load splat
  const splat = new SplatMesh({
    url: "splats/skydiving.ply",
    onProgress: (e) => {
      if (e.total) {
        const pct = Math.round((e.loaded / e.total) * 100);
        status.textContent = `Loading... ${pct}%`;
      }
    },
    onLoad: (mesh) => {
      console.log("Splat loaded", mesh);
      const box = mesh.getBoundingBox();
      const size = new THREE.Vector3();
      box.getCenter(orbitCenter);
      box.getSize(size);
      console.log("Center:", orbitCenter, "Size:", size);

      orbitRadius = Math.max(size.x, size.y, size.z) * 0.6;
      orbitCenterY = orbitCenter.y;
      orbitBaseAngle = Math.atan2(0 - orbitCenter.x, orbitRadius - orbitCenter.z);
      loaded = true;

      status.textContent = "Loaded";
      setTimeout(() => { status.style.display = "none"; }, 2000);
    },
  });
  splat.quaternion.set(1, 0, 0, 0);
  scene.add(splat);

  // Animation loop
  renderer.setAnimationLoop((time) => {
    if (loaded && autoRotate) {
      const angle = orbitBaseAngle + Math.sin(time * 0.001 * orbitSpeed) * orbitSwing;
      camera.position.x = orbitCenter.x + Math.sin(angle) * orbitRadius;
      camera.position.z = orbitCenter.z + Math.cos(angle) * orbitRadius;
      camera.position.y = orbitCenterY;
      camera.lookAt(orbitCenter);
    }
    renderer.render(scene, camera);
    controls.update(camera);
  });

  // Handle resize
  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
