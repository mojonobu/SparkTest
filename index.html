<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Splat Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background: #6bacde; }
    canvas { display: block; }
    #status {
      position: fixed; top: 10px; left: 10px;
      color: #fff; font-family: monospace; font-size: 14px;
      z-index: 10; background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 4px;
    }
    #camera-info {
      position: fixed; bottom: 10px; left: 10px;
      color: #0f0; font-family: monospace; font-size: 13px;
      z-index: 10; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px;
      white-space: pre; user-select: all;
    }
  </style>
</head>
<body>
<div id="status">Loading...</div>
<div id="camera-info"></div>
<script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
      "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
    }
  }
</script>
<script type="module">
  import * as THREE from "three";
  import { SplatMesh, SparkRenderer, SparkControls } from "@sparkjsdev/spark";

  const status = document.getElementById("status");

  // Scene setup
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
  camera.position.set(-0.14, 0.41, 1.4);
  camera.rotation.set(
    THREE.MathUtils.degToRad(7.6),
    THREE.MathUtils.degToRad(9.8),
    THREE.MathUtils.degToRad(-1.3)
  );

  const renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x6bacde);
  document.body.appendChild(renderer.domElement);

  // SparkRenderer for splat rendering
  const spark = new SparkRenderer({ renderer });
  scene.add(spark);

  // Camera controls
  const controls = new SparkControls({ canvas: renderer.domElement });

  // Auto-orbit state
  const orbitCenter = new THREE.Vector3();
  let orbitRadius = 5;
  let orbitBaseAngle = 0;
  const orbitSwing = THREE.MathUtils.degToRad(30); // +/-30 degrees (60 total)
  const orbitSpeed = 0.24; // radians per second
  let orbitCenterY = 0;
  let loaded = false;
  let autoRotate = true;

  // Stop auto-rotate on user interaction
  const canvas = renderer.domElement;
  for (const evt of ["pointerdown", "wheel", "touchstart"]) {
    canvas.addEventListener(evt, () => { autoRotate = false; }, { once: true });
  }

  // Load splat
  const splat = new SplatMesh({
    url: "splats/ship.spz",
    onProgress: (e) => {
      if (e.total) {
        const pct = Math.round((e.loaded / e.total) * 100);
        status.textContent = `Loading... ${pct}%`;
      }
    },
    onLoad: (mesh) => {
      console.log("Splat loaded", mesh);
      const box = mesh.getBoundingBox();
      const size = new THREE.Vector3();
      box.getCenter(orbitCenter);
      box.getSize(size);
      console.log("Center:", orbitCenter, "Size:", size);

      // Use the manually tuned camera position as orbit origin
      orbitRadius = Math.sqrt((-0.14 - orbitCenter.x) ** 2 + (0.96 - orbitCenter.z) ** 2);
      orbitCenterY = 0.41;
      orbitBaseAngle = Math.atan2(-0.14 - orbitCenter.x, 0.96 - orbitCenter.z);
      loaded = true;

      status.textContent = "Loaded";
      setTimeout(() => { status.style.display = "none"; }, 2000);
    },
  });
  splat.quaternion.set(1, 0, 0, 0);
  scene.add(splat);

  // Animation loop
  renderer.setAnimationLoop((time) => {
    if (loaded && autoRotate) {
      const angle = Math.sin(time * 0.001 * orbitSpeed) * orbitSwing;
      splat.rotation.y = angle;
    }
    renderer.render(scene, camera);
    controls.update(camera);

    // Update camera debug info
    const p = camera.position;
    const r = camera.rotation;
    const deg = THREE.MathUtils.radToDeg;
    document.getElementById("camera-info").textContent =
      `pos: (${p.x.toFixed(2)}, ${p.y.toFixed(2)}, ${p.z.toFixed(2)})\n` +
      `rot: (${deg(r.x).toFixed(1)}°, ${deg(r.y).toFixed(1)}°, ${deg(r.z).toFixed(1)}°)`;
  });

  // Handle resize
  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
